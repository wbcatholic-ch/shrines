<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F2A44">
<title>성지 지도 — 가톨릭길동무</title>
<style>
:root{
  --d:#1F2A44;--gold:#C8962A;--gold-l:#FEF3D8;--green:#2A8040;--green-l:#E8F5EC;
  --bg:#F5F3EF;--card:#FFFFFF;--bdr:#E8E3D9;--gray:#8B8477;--gray2:#B5AFA7;
  --shadow:0 2px 10px rgba(31,42,68,.10);--radius:14px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--d:#E8E4DC;--bg:#1A1E2A;--card:#252B3B;--bdr:#343B4F;--gray:#8B91A0;--gray2:#5C6278;
  --shadow:0 2px 10px rgba(0,0,0,.30);}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--d);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}

#kakao-map{position:fixed;inset:0;}

/* 상단 바 */
#top-bar{position:fixed;top:calc(var(--safe-t)+8px);left:12px;right:12px;
  display:flex;gap:8px;z-index:10;}
.bar-btn{background:var(--card);border:none;border-radius:10px;
  box-shadow:var(--shadow);width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;}
#search-input{flex:1;height:42px;padding:0 14px;background:var(--card);
  border:none;border-radius:10px;box-shadow:var(--shadow);
  font-family:inherit;font-size:14px;color:var(--d);outline:none;}
#search-input::placeholder{color:var(--gray2);}

/* 검색 결과 */
#search-results{position:fixed;top:calc(var(--safe-t)+58px);left:12px;right:12px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  max-height:260px;overflow-y:auto;z-index:10;display:none;}
.si{padding:11px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;
  display:flex;align-items:center;gap:10px;}
.si:last-child{border-bottom:none;}
.si:active{background:var(--bg);}
.si-v{color:var(--green);font-size:14px;flex-shrink:0;}
.si-name{font-size:14px;font-weight:700;color:var(--d);}
.si-addr{font-size:11px;color:var(--gray);}

/* FAB */
#fabs{position:fixed;right:14px;bottom:calc(var(--safe-b)+185px);
  display:flex;flex-direction:column;gap:8px;z-index:10;}
.fab{width:44px;height:44px;border-radius:12px;background:var(--card);
  border:none;box-shadow:var(--shadow);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;}

/* 인포카드 */
#info-card{position:fixed;left:0;right:0;bottom:0;background:var(--card);
  border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(31,42,68,.14);
  padding:0 0 calc(var(--safe-b)+8px);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  z-index:20;max-height:70vh;overflow-y:auto;}
#info-card.open{transform:translateY(0);}
.ic-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr);margin:10px auto 14px;}
.ic-header{padding:0 16px 12px;display:flex;align-items:flex-start;gap:10px;}
.ic-name-wrap{flex:1;}
.ic-name{font-size:18px;font-weight:800;letter-spacing:-.04em;color:var(--d);}
.ic-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  background:var(--gold-l);color:var(--gold);display:inline-block;margin-top:4px;}
.ic-close{background:none;border:none;font-size:20px;color:var(--gray);cursor:pointer;padding:0;flex-shrink:0;}
.ic-divider{height:1px;background:var(--bdr);margin:0 16px 12px;}
.ic-row{padding:0 16px;font-size:13px;color:var(--gray);
  display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ic-row a{color:var(--d);font-weight:600;text-decoration:none;}
.ic-btns{display:flex;gap:8px;padding:8px 16px 4px;}
.ic-btn{flex:1;height:44px;border:none;border-radius:10px;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;}
.ic-btn-nav{background:#FEE500;color:#3C1E1E;}
.ic-btn-stamp{background:var(--d);color:#fff;transition:background .15s;}
.ic-btn-stamp.visited{background:var(--green);}
.ic-btn-stamp:disabled{opacity:.6;}

/* 로딩 */
#map-loading{position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5;}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--d);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="kakao-map"></div>
<div id="map-loading"><div class="spinner"></div><span style="font-size:13px;color:var(--gray)">지도 불러오는 중...</span></div>

<div id="top-bar">
  <button class="bar-btn" id="btn-back" aria-label="뒤로">←</button>
  <input id="search-input" type="search" placeholder="성지 이름 검색" autocomplete="off">
  <button class="bar-btn" id="btn-srch-x" style="display:none">✕</button>
</div>
<div id="search-results"></div>

<div id="fabs">
  <button class="fab" id="btn-loc" aria-label="내 위치">📍</button>
  <button class="fab" id="btn-stamp" aria-label="스탬프">🎖</button>
</div>

<div id="info-card">
  <div class="ic-handle"></div>
  <div class="ic-header">
    <div class="ic-name-wrap">
      <div class="ic-name"  id="ic-name">-</div>
      <span class="ic-type" id="ic-type"></span>
    </div>
    <button class="ic-close" id="ic-close">✕</button>
  </div>
  <div class="ic-divider"></div>
  <div class="ic-row" id="ic-addr-row"><span>📍</span><span id="ic-addr"></span></div>
  <div class="ic-row" id="ic-tel-row"><span>📞</span><a id="ic-tel" href="#"></a></div>
  <div class="ic-row" id="ic-links-row"><span>🔗</span><span id="ic-links"></span></div>
  <div class="ic-btns">
    <button class="ic-btn ic-btn-nav"   id="ic-btn-nav">🧭 카카오맵</button>
    <button class="ic-btn ic-btn-stamp" id="ic-btn-stamp">🕊 방문 인증</button>
  </div>
</div>

<script src="shrines.js?v=V2"></script>
<script src="app.js?v=V1"></script>
</body>
</html>
