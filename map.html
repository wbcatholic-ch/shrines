<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1f2a44">
<title>성지 지도 — 가톨릭길동무</title>
<style>
:root {
  --navy:  #1f2a44;
  --gold:  #d4aa6a;
  --cream: #fbf8f1;
  --ink:   #3e362e;
  --sub:   #6b7280;
  --line:  #e5ddd1;
  --A: #c0392b; --B: #1565c0; --C: #1b7a3e;
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: #e8e3d9; }

/* 지도 */
#kakao-map { position: fixed; inset: 0; }

/* 헤더 */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 20;
  background: var(--navy);
  padding: calc(var(--safe-t) + 8px) 12px 8px;
  display: flex; gap: 8px; align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.22);
}
#btn-back {
  width: 36px; height: 36px; flex-shrink: 0; border: none; background: rgba(255,255,255,.12);
  border-radius: 10px; color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#search-wrap { flex: 1; position: relative; }
#search-inp {
  width: 100%; height: 36px; padding: 0 32px 0 12px;
  background: rgba(255,255,255,.12); border: none; border-radius: 10px;
  font-family: inherit; font-size: 13px; color: #fff; outline: none;
}
#search-inp::placeholder { color: rgba(255,255,255,.45); }
#search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: rgba(255,255,255,.6); font-size: 16px;
  cursor: pointer; display: none; line-height: 1; padding: 0;
}

/* 검색 결과 */
#search-results {
  position: fixed; top: calc(var(--safe-t) + 58px); left: 12px; right: 12px;
  background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(14,21,53,.18);
  max-height: 52vh; overflow-y: auto; z-index: 19; display: none;
}
.sr-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
.sr-item:last-child { border: none; }
.sr-item:active { background: var(--cream); }
.sr-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.sr-main { flex: 1; min-width: 0; }
.sr-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.sr-addr { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sr-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 6px; flex-shrink: 0; }
.sr-region { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; border-top: 1px solid var(--line); }
.sr-region-ico { font-size: 18px; }
.sr-region-txt { font-size: 13px; font-weight: 700; color: var(--navy); }

/* FAB */
#fabs {
  position: fixed; right: 12px; bottom: calc(var(--safe-b) + 14px);
  display: flex; flex-direction: column; gap: 8px; z-index: 15;
}
.fab {
  width: 44px; height: 44px; border-radius: 14px; border: none; cursor: pointer;
  background: var(--navy); color: #fff; font-size: 19px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 3px 12px rgba(14,21,53,.28);
}

/* 타입 범례 */
#legend {
  position: fixed; left: 12px; bottom: calc(var(--safe-b) + 14px); z-index: 15;
  background: rgba(255,255,255,.92); backdrop-filter: blur(4px);
  border-radius: 10px; padding: 6px 10px;
  display: flex; flex-direction: column; gap: 4px;
  box-shadow: 0 2px 8px rgba(14,21,53,.14);
}
.lg { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; color: var(--ink); }
.lg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* 길찾기 하단 바 */
#route-bar {
  position: fixed; left: 12px; right: 64px; bottom: calc(var(--safe-b) + 14px);
  background: var(--navy); border-radius: 14px; padding: 10px 12px;
  display: none; align-items: center; gap: 8px; z-index: 15;
  box-shadow: 0 4px 16px rgba(14,21,53,.32);
}
#rb-summary { flex: 1; font-size: 11px; color: rgba(255,255,255,.8); line-height: 1.5; min-width: 0; }
#rb-summary strong { color: #fff; font-size: 12px; }
#rb-navi { flex-shrink: 0; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; padding: 7px 12px; font-family: inherit; font-size: 12px; font-weight: 800; cursor: pointer; }
#rb-clear { flex-shrink: 0; background: rgba(255,255,255,.14); border: none; border-radius: 8px; color: rgba(255,255,255,.7); font-size: 15px; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* 내주변 패널 */
#nearby-panel {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
  background: #fff; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(14,21,53,.18);
  transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
  max-height: 62vh; display: flex; flex-direction: column;
  padding-bottom: var(--safe-b);
}
#nearby-panel.open { transform: none; }
.np-drag { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 12px; flex-shrink: 0; }
.np-head { display: flex; align-items: center; padding: 0 14px 10px; flex-shrink: 0; }
.np-title { flex: 1; font-size: 15px; font-weight: 800; color: var(--ink); }
.np-close { background: none; border: none; font-size: 20px; color: var(--sub); cursor: pointer; }
#nearby-list { overflow-y: auto; }
.ni { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
.ni:last-child { border: none; }
.ni:active { background: var(--cream); }
.ni-num { width: 26px; height: 26px; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.ni-info { flex: 1; min-width: 0; }
.ni-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.ni-addr { font-size: 11px; color: var(--sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ni-dist { font-size: 11px; font-weight: 700; flex-shrink: 0; text-align: right; }

/* 인포카드 */
#info-card {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
  background: #fff; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(14,21,53,.18);
  transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
  padding-bottom: var(--safe-b); max-height: 68vh; overflow-y: auto;
}
#info-card.open { transform: none; }
.ic-drag { width: 38px; height: 4px; background: var(--line); border-radius: 2px; margin: 10px auto 0; }
.ic-hd { display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px 10px; }
.ic-name { flex: 1; font-size: 18px; font-weight: 800; color: var(--ink); letter-spacing: -.04em; line-height: 1.2; }
.ic-type-badge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; color: #fff; flex-shrink: 0; margin-top: 3px; }
.ic-close { background: none; border: none; font-size: 20px; color: var(--sub); cursor: pointer; flex-shrink: 0; padding: 0; }
.ic-div { height: 1px; background: var(--line); margin: 0 16px; }
.ic-row { display: flex; gap: 8px; padding: 10px 16px; font-size: 13px; color: var(--sub); align-items: flex-start; }
.ic-row a { color: var(--navy); font-weight: 700; text-decoration: none; }
.ic-route-row { display: flex; gap: 6px; padding: 8px 16px 0; }
.ic-btn-r { flex: 1; height: 36px; border: none; border-radius: 9px; font-family: inherit; font-size: 11px; font-weight: 800; cursor: pointer; }
.ic-btns { display: flex; gap: 8px; padding: 10px 16px 4px; }
.ic-btn { flex: 1; height: 44px; border: none; border-radius: 12px; font-family: inherit; font-size: 13px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
.ic-btn-map   { background: #FEE500; color: #3B1E00; }
.ic-btn-stamp { background: var(--navy); color: #fff; font-size: 12px; }
.ic-btn-stamp.on { background: #1b7a3e; }

/* 지도 로딩 */
#map-loading {
  position: fixed; inset: 0; z-index: 10;
  background: var(--cream); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.spinner { width: 34px; height: 34px; border: 3px solid var(--line); border-top-color: var(--navy); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-txt { font-size: 13px; color: var(--sub); font-weight: 600; }

/* 순례 기록 토스트 */
#stamp-toast {
  position: fixed; bottom: calc(var(--safe-b) + 80px); left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(31,42,68,.96); color: #fff;
  padding: 11px 22px; border-radius: 24px;
  font-size: 14px; font-weight: 700; white-space: nowrap;
  opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 99;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
}
#stamp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="kakao-map"></div>
<div id="map-loading"><div class="spinner"></div><p class="loading-txt">지도 불러오는 중…</p></div>

<!-- 헤더 -->
<div id="hdr">
  <button id="btn-back">←</button>
  <div id="search-wrap">
    <input id="search-inp" type="search" placeholder="성지 이름 또는 지역 검색" autocomplete="off">
    <button id="search-clear">✕</button>
  </div>
</div>

<!-- 검색 결과 -->
<div id="search-results"></div>

<!-- FAB -->
<div id="fabs">
  <button class="fab" id="btn-nearby" title="내 주변">📍</button>
  <button class="fab" id="btn-stamp-p" title="순례 스탬프">🎖</button>
</div>

<!-- 타입 범례 -->
<div id="legend">
  <div class="lg"><div class="lg-dot" style="background:var(--A)"></div>성지</div>
  <div class="lg"><div class="lg-dot" style="background:var(--B)"></div>순례지</div>
  <div class="lg"><div class="lg-dot" style="background:var(--C)"></div>순교사적지</div>
</div>

<!-- 길찾기 하단 바 -->
<div id="route-bar">
  <button id="rb-clear">✕</button>
  <div id="rb-summary"></div>
  <button id="rb-navi">🧭 내비</button>
</div>

<!-- 내주변 패널 -->
<div id="nearby-panel">
  <div class="np-drag"></div>
  <div class="np-head">
    <span class="np-title">내 주변 성지</span>
    <button class="np-close" id="btn-nearby-close">✕</button>
  </div>
  <div id="nearby-list"></div>
</div>

<!-- 인포카드 -->
<div id="info-card">
  <div class="ic-drag"></div>
  <div class="ic-hd">
    <div class="ic-name" id="ic-name">-</div>
    <div class="ic-type-badge" id="ic-type"></div>
    <button class="ic-close" id="ic-close">✕</button>
  </div>
  <div class="ic-div"></div>
  <div class="ic-row" id="ic-addr"><span>📍</span><span id="ic-addr-txt"></span></div>
  <div class="ic-row" id="ic-tel"><span>📞</span><a id="ic-tel-a"></a></div>
  <div class="ic-row" id="ic-links"><span>🔗</span><span id="ic-links-txt"></span></div>
  <div class="ic-route-row">
    <button class="ic-btn-r" style="background:#FF0000;color:#fff" onclick="setRoute('s')">🚩 출발</button>
    <button class="ic-btn-r" style="background:#FF8C00;color:#fff" onclick="setRoute('v')">➕ 경유</button>
    <button class="ic-btn-r" style="background:#005BFF;color:#fff" onclick="setRoute('e')">🏁 도착</button>
  </div>
  <div class="ic-btns">
    <button class="ic-btn ic-btn-map" id="ic-nav">🧭 카카오맵</button>
    <button class="ic-btn ic-btn-stamp" id="ic-stamp">📍 성지에 가까워지면 자동으로 기록됩니다</button>
  </div>
</div>

<div id="stamp-toast"></div>

<script src="shrines.js?v=V2"></script>
<script src="courses.js?v=V1b"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="app.js?v=V1"></script>
</body>
</html>
