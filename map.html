<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F2A44">
<title>성지 지도 — 가톨릭길동무</title>
<style>
:root{
  --d:#1F2A44;--gold:#C8962A;--green:#2A8040;
  --clr-A:#c0392b;--clr-B:#1565c0;--clr-C:#1b7a3e;--clr-route:#7B2FBE;
  --bg:#F5F3EF;--card:#fff;--bdr:#E8E3D9;--gray:#8B8477;--gray2:#B5AFA7;
  --shadow:0 2px 10px rgba(31,42,68,.12);--radius:14px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--d:#E8E4DC;--bg:#1A1E2A;--card:#252B3B;--bdr:#343B4F;--gray:#8B91A0;--gray2:#5C6278;}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--d);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}

/* 지도 */
#kakao-map{position:fixed;inset:0;}

/* 상단 바 */
#top-bar{position:fixed;top:calc(var(--safe-t)+8px);left:12px;right:12px;display:flex;gap:6px;z-index:10;}
.bar-btn{background:var(--card);border:none;border-radius:10px;box-shadow:var(--shadow);
  width:42px;height:42px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;flex-shrink:0;}
#search-input{flex:1;height:42px;padding:0 12px;background:var(--card);border:none;
  border-radius:10px;box-shadow:var(--shadow);font-family:inherit;font-size:14px;color:var(--d);outline:none;}
#search-input::placeholder{color:var(--gray2);}

/* 모드 칩 */
#mode-bar{position:fixed;top:calc(var(--safe-t)+58px);left:12px;right:12px;
  display:flex;gap:6px;z-index:10;overflow-x:auto;scrollbar-width:none;}
#mode-bar::-webkit-scrollbar{display:none;}
.mode-chip{white-space:nowrap;border:none;border-radius:20px;padding:5px 13px;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;
  background:var(--card);color:var(--gray);box-shadow:var(--shadow);}
.mode-chip.on{background:var(--d);color:#fff;}

/* 검색 결과 */
#search-results{position:fixed;top:calc(var(--safe-t)+100px);left:12px;right:12px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  max-height:260px;overflow-y:auto;z-index:10;display:none;}
.si{padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;
  display:flex;align-items:center;gap:10px;}
.si:last-child{border-bottom:none;}
.si:active{background:var(--bg);}
.si-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.si-body{flex:1;min-width:0;}
.si-name{font-size:14px;font-weight:700;color:var(--d);}
.si-sub{font-size:11px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.si-type{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;flex-shrink:0;}

/* 내주변 결과 */
#nearby-panel{position:fixed;left:0;right:0;bottom:0;background:var(--card);
  border-radius:18px 18px 0 0;box-shadow:0 -4px 20px rgba(31,42,68,.14);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);
  z-index:20;max-height:60vh;display:flex;flex-direction:column;}
#nearby-panel.open{transform:translateY(0);}
.np-handle{width:36px;height:4px;background:var(--bdr);border-radius:2px;margin:10px auto 0;}
.np-title{font-size:14px;font-weight:800;color:var(--d);padding:10px 16px 8px;}
#nearby-list{overflow-y:auto;padding:0 0 calc(var(--safe-b)+10px);}
.ni{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bdr);cursor:pointer;}
.ni:last-child{border-bottom:none;}
.ni-no{width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ni-info{flex:1;min-width:0;}
.ni-name{font-size:13px;font-weight:700;color:var(--d);}
.ni-addr{font-size:11px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ni-meta{text-align:right;flex-shrink:0;}
.ni-type{font-size:9px;font-weight:700;padding:1px 6px;border-radius:6px;margin-bottom:2px;display:block;}
.ni-dist{font-size:11px;font-weight:700;}

/* 길찾기 패널 */
#route-panel{position:fixed;top:calc(var(--safe-t)+8px);left:12px;right:12px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  z-index:11;display:none;padding:10px 12px;}
.rp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rp-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.rp-dot-s{background:#FF0000;}
.rp-dot-v{background:#FF8C00;}
.rp-dot-e{background:#005BFF;}
.rp-txt{flex:1;font-size:13px;font-weight:700;color:var(--d);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rp-empty{color:var(--gray);font-weight:400;}
.rp-x{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;padding:0;flex-shrink:0;}
.rp-add{background:none;border:1.5px dashed var(--bdr);border-radius:8px;
  width:100%;height:32px;font-family:inherit;font-size:12px;color:var(--gray);cursor:pointer;margin:2px 0 8px;}
.rp-btns{display:flex;gap:6px;}
.rp-btn-close{flex:1;height:38px;background:var(--bg);border:1px solid var(--bdr);
  border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;color:var(--gray);cursor:pointer;}
.rp-btn-navi{flex:2;height:38px;background:var(--d);color:#fff;border:none;
  border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}

/* FAB */
#fabs{position:fixed;right:14px;bottom:calc(var(--safe-b)+16px);
  display:flex;flex-direction:column;gap:8px;z-index:10;}
.fab{width:44px;height:44px;border-radius:12px;background:var(--card);border:none;
  box-shadow:var(--shadow);cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;}

/* 타입 범례 */
#legend{position:fixed;left:12px;bottom:calc(var(--safe-b)+16px);
  background:var(--card);border-radius:10px;box-shadow:var(--shadow);
  padding:6px 10px;display:flex;gap:10px;z-index:10;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--gray);}
.lg-dot{width:8px;height:8px;border-radius:50%;}

/* 인포카드 */
#info-card{position:fixed;left:0;right:0;bottom:0;background:var(--card);
  border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(31,42,68,.14);
  padding:0 0 calc(var(--safe-b)+8px);
  transform:translateY(100%);transition:transform .28s cubic-bezier(.32,.72,0,1);z-index:20;
  max-height:72vh;overflow-y:auto;}
#info-card.open{transform:translateY(0);}
.ic-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr);margin:10px auto 14px;}
.ic-header{padding:0 16px 12px;display:flex;align-items:flex-start;gap:10px;}
.ic-name-wrap{flex:1;}
.ic-name{font-size:18px;font-weight:800;letter-spacing:-.04em;color:var(--d);}
.ic-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px;color:#fff;}
.ic-close{background:none;border:none;font-size:20px;color:var(--gray);cursor:pointer;padding:0;flex-shrink:0;}
.ic-divider{height:1px;background:var(--bdr);margin:0 16px 12px;}
.ic-row{padding:0 16px;font-size:13px;color:var(--gray);display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.ic-row a{color:var(--d);font-weight:600;text-decoration:none;}
.ic-btns-route{display:flex;gap:6px;padding:4px 16px 0;}
.ic-btns-main{display:flex;gap:8px;padding:8px 16px 4px;}
.ic-btn{flex:1;height:42px;border:none;border-radius:10px;font-family:inherit;font-size:12px;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.ic-btn-nav{background:#FEE500;color:#3C1E1E;}
.ic-btn-stamp{background:var(--d);color:#fff;transition:background .15s;}
.ic-btn-stamp.visited{background:#2A8040;}
.ic-btn-stamp:disabled{opacity:.6;}
.ic-btn-route-s{background:#FF0000;color:#fff;font-size:11px;}
.ic-btn-route-v{background:#FF8C00;color:#fff;font-size:11px;}
.ic-btn-route-e{background:#005BFF;color:#fff;font-size:11px;}

/* 지도 로딩 */
#map-loading{position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5;}
.spinner{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--d);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* GPS 자동 인증 토스트 */
#stamp-toast{
  position:fixed;bottom:calc(var(--safe-b)+100px);left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(31,42,68,.95);color:#fff;
  padding:11px 22px;border-radius:24px;
  font-size:14px;font-weight:700;white-space:nowrap;
  opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;z-index:99;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
#stamp-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="kakao-map"></div>
<div id="map-loading"><div class="spinner"></div><span style="font-size:13px;color:var(--gray)">지도 불러오는 중...</span></div>

<!-- 상단 바 -->
<div id="top-bar">
  <button class="bar-btn" id="btn-back">←</button>
  <input id="search-input" type="search" placeholder="성지 이름 또는 지역 검색" autocomplete="off">
  <button class="bar-btn" id="btn-srch-x" style="display:none">✕</button>
</div>

<!-- 모드 칩 -->
<div id="mode-bar">
  <button class="mode-chip on" id="chip-shrine" onclick="setSearchMode('shrine')">성지찾기</button>
  <button class="mode-chip"    id="chip-region" onclick="setSearchMode('region')">지역검색</button>
  <button class="mode-chip"    id="chip-nearby" onclick="openNearby()">내주변</button>
  <button class="mode-chip"    id="chip-route"  onclick="toggleRouteMode()">길찾기</button>
</div>

<!-- 검색 결과 -->
<div id="search-results"></div>

<!-- 길찾기 패널 -->
<div id="route-panel">
  <div class="rp-row"><div class="rp-dot rp-dot-s"></div><div class="rp-txt" id="rp-start"><span class="rp-empty">출발지</span></div><button class="rp-x" id="rp-clear-s" onclick="clearRoutePoint('s')" style="display:none">✕</button></div>
  <div id="rp-via-wrap"></div>
  <button class="rp-add" id="rp-add-via" onclick="addViaPoint()">+ 경유지 추가</button>
  <div class="rp-row"><div class="rp-dot rp-dot-e"></div><div class="rp-txt" id="rp-end"><span class="rp-empty">도착지</span></div><button class="rp-x" id="rp-clear-e" onclick="clearRoutePoint('e')" style="display:none">✕</button></div>
  <div class="rp-btns">
    <button class="rp-btn-close" onclick="toggleRouteMode()">취소</button>
    <button class="rp-btn-navi" id="rp-navi-btn" onclick="startRouteNavi()" style="opacity:.5;pointer-events:none">🧭 카카오내비 시작</button>
  </div>
</div>

<!-- FAB -->
<div id="fabs">
  <button class="fab" id="btn-loc" title="내 위치">📍</button>
  <button class="fab" id="btn-stamp" title="순례 스탬프">🎖</button>
</div>

<!-- 범례 -->
<div id="legend">
  <div class="lg-item"><div class="lg-dot" style="background:var(--clr-A)"></div>성지</div>
  <div class="lg-item"><div class="lg-dot" style="background:var(--clr-B)"></div>순례지</div>
  <div class="lg-item"><div class="lg-dot" style="background:var(--clr-C)"></div>순교사적지</div>
</div>

<!-- 내주변 패널 -->
<div id="nearby-panel">
  <div class="np-handle"></div>
  <div style="display:flex;align-items:center;padding:10px 16px 8px;">
    <div class="np-title" style="padding:0;flex:1">내 주변 성지</div>
    <button class="bar-btn" style="width:32px;height:32px;font-size:16px;" onclick="closeNearby()">✕</button>
  </div>
  <div id="nearby-list"></div>
</div>

<!-- 인포카드 -->
<div id="info-card">
  <div class="ic-handle"></div>
  <div class="ic-header">
    <div class="ic-name-wrap">
      <div class="ic-name" id="ic-name">-</div>
      <span class="ic-type" id="ic-type"></span>
    </div>
    <button class="ic-close" id="ic-close">✕</button>
  </div>
  <div class="ic-divider"></div>
  <div class="ic-row" id="ic-addr-row"><span>📍</span><span id="ic-addr"></span></div>
  <div class="ic-row" id="ic-tel-row"><span>📞</span><a id="ic-tel" href="#"></a></div>
  <div class="ic-row" id="ic-links-row"><span>🔗</span><span id="ic-links"></span></div>
  <!-- 길찾기 버튼 -->
  <div class="ic-btns-route" id="ic-route-btns">
    <button class="ic-btn ic-btn-route-s" onclick="setRoutePoint('s')">🚩 출발지로</button>
    <button class="ic-btn ic-btn-route-v" onclick="setRoutePoint('v')">➕ 경유지로</button>
    <button class="ic-btn ic-btn-route-e" onclick="setRoutePoint('e')">🏁 도착지로</button>
  </div>
  <div class="ic-btns-main">
    <button class="ic-btn ic-btn-nav" id="ic-btn-nav">🧭 카카오맵</button>
    <button class="ic-btn ic-btn-stamp" id="ic-btn-stamp">🕊 방문 인증</button>
  </div>
</div>

<div id="stamp-toast"></div>

<script src="shrines.js?v=V2"></script>
<script src="courses.js?v=V1b"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
<script src="app.js?v=V1"></script>
</body>
</html>
