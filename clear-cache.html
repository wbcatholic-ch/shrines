<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>캐시 초기화</title>
<style>
body { font-family: sans-serif; padding: 40px 20px; text-align: center; background: #1f2a44; color: #fff; }
button { background: #c0392b; color: #fff; border: none; padding: 14px 28px; border-radius: 12px; font-size: 16px; cursor: pointer; margin: 10px; }
#log { text-align: left; background: rgba(255,255,255,.1); border-radius: 8px; padding: 12px; margin-top: 20px; font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>
<h2>🗑️ 캐시 초기화</h2>
<p>지도가 안 열릴 때 눌러주세요</p>
<button onclick="clearAll()">캐시 전체 삭제 후 새로고침</button>
<div id="log"></div>
<script>
async function clearAll() {
  const log = document.getElementById('log');
  log.innerHTML = '';
  function add(msg) { log.innerHTML += msg + '<br>'; }

  // 1. 서비스워커 등록 해제
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    for (const r of regs) {
      await r.unregister();
      add('✅ SW 해제: ' + r.scope);
    }
  }

  // 2. 캐시 전체 삭제
  const keys = await caches.keys();
  for (const k of keys) {
    await caches.delete(k);
    add('✅ 캐시 삭제: ' + k);
  }

  add('<br>🔄 3초 후 지도 페이지로 이동합니다...');
  setTimeout(() => { location.href = './map.html?nocache=' + Date.now(); }, 3000);
}
</script>
</body>
</html>
