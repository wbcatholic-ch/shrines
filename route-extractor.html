<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>순례길 경로 추출기 — 개발 전용</title>
<style>
body{font-family:'Apple SD Gothic Neo',sans-serif;margin:0;padding:16px;background:#f5f3ef;color:#1F2A44;}
h2{font-size:17px;margin-bottom:4px;}
.sub{font-size:12px;color:#8B8477;margin-bottom:16px;}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(31,42,68,.08);}
label{font-size:12px;font-weight:700;color:#8B8477;display:block;margin-bottom:4px;}
input{width:100%;box-sizing:border-box;height:40px;padding:0 12px;border:1.5px solid #E8E3D9;border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
input:focus{border-color:#1F2A44;}
button{width:100%;height:44px;background:#1F2A44;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;}
button:active{opacity:.8;}
button:disabled{opacity:.4;cursor:not-allowed;}
#map{width:100%;height:350px;border-radius:10px;margin-bottom:12px;background:#e8e4dc;}
#status{font-size:13px;font-weight:600;padding:8px 0;color:#C8962A;min-height:20px;}
#output-wrap{display:none;}
textarea{width:100%;box-sizing:border-box;height:180px;padding:10px;border:1.5px solid #E8E3D9;border-radius:8px;font-size:11px;font-family:monospace;resize:vertical;outline:none;}
.copy-btn{width:100%;height:38px;background:#2A8040;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.wp-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #E8E3D9;font-size:13px;}
.wp-row:last-child{border-bottom:none;}
.wp-no{width:24px;height:24px;border-radius:50%;background:#1B7FD8;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.wp-done{background:#2A8040;}
.note{font-size:11px;color:#8B8477;line-height:1.6;margin-top:8px;}
</style>
</head>
<body>
<h2>순례길 1코스 경로 추출기</h2>
<div class="sub">개발 전용 도구 — 카카오 REST API로 경로 좌표를 자동 추출합니다</div>

<div class="card">
  <label>Kakao REST API Key</label>
  <input id="api-key" type="text" placeholder="KakaoAK xxxxxx 또는 키만 입력">
  <div class="note">⚠️ 이 도구는 개발용입니다. 추출 후 routes.js에 붙여넣고 이 파일은 삭제하세요.</div>
  <button id="btn-start" onclick="startExtract()">경로 추출 시작</button>
</div>

<div class="card">
  <label>추출 진행</label>
  <div id="status">API 키를 입력하고 시작하세요.</div>
  <div id="wp-list"></div>
</div>

<div id="map"></div>

<div class="card" id="output-wrap">
  <label>routes.js path 배열 — 복사해서 붙여넣으세요</label>
  <textarea id="output" readonly></textarea>
  <button class="copy-btn" onclick="copyOutput()">📋 복사</button>
</div>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=07f7989e29fdfb425fff924f36fb3ec0&autoload=false"></script>
<script src="shrines.js?v=V2"></script>
<script>
'use strict';

/* 1코스 경유지 seq 순서 */
const WP_SEQS = [
  { no:1, seq:'20190001', label:'명동 대성당' },
  { no:2, seq:'20190115', label:'김범우의 집터' },
  { no:3, seq:'20190120', label:'한국 천주교회 창립 터' },
  { no:4, seq:'20190123', label:'좌포도청 터' },
  { no:5, seq:'20190122', label:'종로 성당' },
  { no:6, seq:'20190003', label:'광희문 성지' },
  { no:7, seq:'20190002', label:'가톨릭대학교 성신교정' },
  { no:8, seq:'20190179', label:'석정보름우물' },
  { no:9, seq:'20190113', label:'가회동 성당' }
];

let _map, _byseq = {}, _allPath = [];

/* shrines.js 로드 후 seq→shrine 맵 */
(window._SH_RAW||[]).forEach(function(s){ _byseq[s.seq]=s; });

/* 경유지 목록 초기 렌더 */
function renderWpList(doneSet) {
  document.getElementById('wp-list').innerHTML = WP_SEQS.map(function(wp) {
    const done = doneSet && doneSet.has(wp.seq);
    return '<div class="wp-row">'
      + '<div class="wp-no ' + (done?'wp-done':'') + '">' + (done?'✓':wp.no) + '</div>'
      + wp.label + '</div>';
  }).join('');
}
renderWpList(null);

/* Kakao 지도 초기화 */
kakao.maps.load(function() {
  _map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5720, 126.9900),
    level: 7
  });
  WP_SEQS.forEach(function(wp) {
    const s = _byseq[wp.seq];
    if (!s) return;
    new kakao.maps.Marker({
      map: _map,
      position: new kakao.maps.LatLng(s.lat, s.lng),
      title: wp.no + '. ' + s.name
    });
  });
});

/* 경로 추출 메인 */
async function startExtract() {
  let key = document.getElementById('api-key').value.trim();
  if (!key) { alert('API 키를 입력해 주세요.'); return; }
  if (!key.startsWith('KakaoAK ')) key = 'KakaoAK ' + key;

  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  _allPath = [];
  const doneSeqs = new Set();

  /* 9개 경유지를 한 번에 — waypoints API 사용 */
  const pts = WP_SEQS.map(function(wp) {
    const s = _byseq[wp.seq];
    return s ? { name: wp.label, x: String(s.lng), y: String(s.lat) } : null;
  }).filter(Boolean);

  if (pts.length < 2) { alert('성지 데이터를 불러오지 못했습니다.'); btn.disabled=false; return; }

  const origin = pts.shift();
  const destination = pts.pop();
  const waypoints = pts;

  setStatus('카카오 API 호출 중... (전체 경로 한 번에)');

  try {
    const body = JSON.stringify({
      origin: { x: origin.x, y: origin.y },
      destination: { x: destination.x, y: destination.y },
      waypoints: waypoints,
      priority: 'RECOMMEND',
      road_details: false
    });

    const res = await fetch('https://apis-navi.kakaomobility.com/v1/waypoints/directions', {
      method: 'POST',
      headers: {
        'Authorization': key,
        'Content-Type': 'application/json'
      },
      body: body
    });

    if (!res.ok) throw new Error('API 오류 ' + res.status + ' — API 키를 확인해 주세요.');
    const data = await res.json();

    if (!data.routes || !data.routes[0] || data.routes[0].result_code !== 0) {
      throw new Error('경로를 찾을 수 없습니다. result_code: ' + (data.routes&&data.routes[0]?data.routes[0].result_code:'없음'));
    }

    /* 모든 섹션의 vertexes 추출 [lng,lat,lng,lat,...] → [[lat,lng],...] */
    const route = data.routes[0];
    route.sections.forEach(function(section) {
      section.roads.forEach(function(road) {
        const v = road.vertexes; // [lng,lat, lng,lat, ...]
        for (let i = 0; i < v.length; i += 2) {
          _allPath.push([v[i+1], v[i]]); // [lat, lng]
        }
      });
    });

    WP_SEQS.forEach(function(wp){ doneSeqs.add(wp.seq); });
    renderWpList(doneSeqs);
    setStatus('✅ 추출 완료! 총 ' + _allPath.length + '개 좌표. 아래 코드를 복사해 routes.js에 붙여넣으세요.');
    drawRouteOnMap();
    showOutput();

  } catch(e) {
    setStatus('❌ 오류: ' + e.message);
    btn.disabled = false;
  }
}

function drawRouteOnMap() {
  if (!_map || !_allPath.length) return;
  new kakao.maps.Polyline({
    map: _map,
    path: _allPath.map(function(c){ return new kakao.maps.LatLng(c[0],c[1]); }),
    strokeWeight: 5, strokeColor: '#1B7FD8', strokeOpacity: 0.9
  });
  const bounds = new kakao.maps.LatLngBounds();
  _allPath.forEach(function(c){ bounds.extend(new kakao.maps.LatLng(c[0],c[1])); });
  _map.setBounds(bounds, 30);
}

function showOutput() {
  const lines = _allPath.map(function(c){ return '    [' + c[0] + ', ' + c[1] + ']'; });
  const out = '  path: [\n' + lines.join(',\n') + '\n  ]';
  document.getElementById('output').value = out;
  document.getElementById('output-wrap').style.display = 'block';
}

function copyOutput() {
  const ta = document.getElementById('output');
  ta.select(); document.execCommand('copy');
  alert('복사되었습니다! routes.js의 path 배열을 이 내용으로 교체하세요.');
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
