<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="길동무">
<link rel="apple-touch-icon" href="icon-192x192.png">
<meta name="theme-color" content="#1f2a44">
<title>순례길 — 가톨릭길동무</title>
<style>
:root{
  --d:#1F2A44;--gold:#C8962A;--gold-l:#FEF3D8;--green:#2A8040;
  --bg:#F5F3EF;--card:#FFFFFF;--bdr:#E8E3D9;--gray:#8B8477;--gray2:#B5AFA7;
  --route:#1B7FD8;--shadow:0 2px 10px rgba(31,42,68,.10);--radius:14px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--d:#E8E4DC;--bg:#1A1E2A;--card:#252B3B;--bdr:#343B4F;--gray:#8B91A0;--gray2:#5C6278;}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--d);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;-webkit-tap-highlight-color:transparent;}

/* 헤더 */
.rt-bar{display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t)+10px) 16px 10px;background:var(--d);}
.rt-back{background:none;border:none;color:rgba(255,255,255,.8);
  font-size:22px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.rt-title-wrap{flex:1;}
.rt-title{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.04em;}
.rt-sub{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;letter-spacing:.04em;margin-top:1px;}

/* 스크롤 영역 */
#scroll{overflow-y:auto;height:calc(100vh - 64px - var(--safe-t) - var(--safe-b));
  padding:12px 16px calc(var(--safe-b)+20px);}

/* 지역 그룹 */
.region-title{font-size:12px;font-weight:700;color:var(--gray);
  letter-spacing:.06em;margin:16px 0 8px;}
.region-title:first-child{margin-top:4px;}

/* 순례길 카드 */
.route-card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);
  cursor:pointer;transition:transform .12s;}
.route-card:active{transform:scale(.98);}
.rc-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rc-org{font-size:10px;font-weight:700;color:var(--gray);background:var(--bg);
  padding:2px 8px;border-radius:8px;}
.rc-has-map{font-size:10px;font-weight:700;color:var(--route);background:rgba(27,127,216,.1);
  padding:2px 8px;border-radius:8px;}
.rc-region{font-size:10px;color:var(--gray2);font-weight:600;margin-left:auto;}
.rc-name{font-size:15px;font-weight:700;color:var(--d);letter-spacing:-.03em;}

/* 상세 패널 (슬라이드) */
#detail-panel{position:fixed;inset:0;background:var(--bg);
  transform:translateX(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);
  z-index:50;display:flex;flex-direction:column;}
#detail-panel.open{transform:translateX(0);}
.dp-bar{display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t)+10px) 16px 10px;background:var(--d);}
.dp-back{background:none;border:none;color:rgba(255,255,255,.8);
  font-size:22px;cursor:pointer;padding:4px 6px;flex-shrink:0;}
.dp-title{flex:1;font-size:16px;font-weight:800;color:#fff;letter-spacing:-.03em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dp-body{flex:1;overflow-y:auto;padding:16px 16px calc(var(--safe-b)+16px);}
.dp-section{background:var(--card);border-radius:var(--radius);padding:14px 16px;
  margin-bottom:10px;border:1px solid var(--bdr);}
.dp-label{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:6px;letter-spacing:.04em;}
.dp-val{font-size:14px;color:var(--d);font-weight:600;line-height:1.6;}
.dp-desc{font-size:13px;color:var(--gray);line-height:1.7;}
.dp-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.dp-btn{width:100%;height:46px;border:none;border-radius:12px;
  font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;}
.dp-btn-map {background:var(--route);color:#fff;}
.dp-btn-web {background:var(--bg);color:var(--d);border:1.5px solid var(--bdr);}
.dp-btn-navi{background:var(--d);color:#fff;}

/* 경유지 목록 (지도 있는 코스) */
.dp-waypoints{display:flex;flex-direction:column;gap:0;}
.dpw-item{display:flex;align-items:center;gap:10px;padding:8px 0;
  border-bottom:1px solid var(--bdr);}
.dpw-item:last-child{border-bottom:none;}
.dpw-no{width:24px;height:24px;border-radius:50%;background:var(--route);color:#fff;
  font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dpw-name{font-size:13px;font-weight:600;color:var(--d);}
</style>
</head>
<body>

<!-- 목록 화면 -->
<div class="rt-bar">
  <button class="rt-back" onclick="history.back()">←</button>
  <div class="rt-title-wrap">
    <div class="rt-title">순례길</div>
    <div class="rt-sub">PILGRIMAGE ROUTES</div>
  </div>
</div>
<div id="scroll"></div>

<!-- 상세 패널 -->
<div id="detail-panel">
  <div class="dp-bar">
    <button class="dp-back" onclick="closeDetail()">←</button>
    <div class="dp-title" id="dp-title">순례길</div>
  </div>
  <div class="dp-body" id="dp-body"></div>
</div>

<script src="shrines.js?v=V2"></script>
<script src="routes.js?v=V2"></script>
<script>
'use strict';
var _byseq = {};
(window._SH_RAW || []).forEach(function(s){ _byseq[s.seq] = s; });

var REGION_ORDER = [
  {key:'수도권', orgs:['서울대교구','수원교구','인천교구','의정부교구']},
  {key:'강원·충청', orgs:['원주교구','춘천교구','청주교구','대전교구','원주시청','보령시청','사단법인 내포문화숲길','당진시청']},
  {key:'경상', orgs:['대구대교구','부산교구','마산교구','안동교구']},
  {key:'전라·제주', orgs:['광주대교구','전주교구','제주교구']}
];

function renderList() {
  var routes = window._ROUTES || [];
  var html = '';
  REGION_ORDER.forEach(function(region) {
    var list = routes.filter(function(r){
      return region.orgs.indexOf(r.org) !== -1;
    });
    if (!list.length) return;
    html += '<div class="region-title">' + region.key + '</div>';
    list.forEach(function(r) {
      html += '<div class="route-card" onclick="openDetail(\'' + r.id + '\')">'
        + '<div class="rc-top">'
        +   '<span class="rc-org">' + r.org + '</span>'
        +   (r.hasMap ? '<span class="rc-has-map">🗺 지도 있음</span>' : '')
        +   '<span class="rc-region">📍' + r.region + '</span>'
        + '</div>'
        + '<div class="rc-name">' + escHtml(r.title) + '</div>'
        + '</div>';
    });
  });
  /* 위 그룹에 없는 것들 */
  var grouped = REGION_ORDER.flatMap(function(r){ return r.orgs; });
  var rest = routes.filter(function(r){ return grouped.indexOf(r.org) === -1; });
  if (rest.length) {
    html += '<div class="region-title">기타</div>';
    rest.forEach(function(r) {
      html += '<div class="route-card" onclick="openDetail(\'' + r.id + '\')">'
        + '<div class="rc-top"><span class="rc-org">' + r.org + '</span>'
        +   (r.hasMap ? '<span class="rc-has-map">🗺 지도 있음</span>' : '')
        +   '<span class="rc-region">📍' + r.region + '</span>'
        + '</div>'
        + '<div class="rc-name">' + escHtml(r.title) + '</div>'
        + '</div>';
    });
  }
  document.getElementById('scroll').innerHTML = html;
}

function openDetail(id) {
  var r = (window._ROUTES || []).find(function(x){ return x.id === id; });
  if (!r) return;
  document.getElementById('dp-title').textContent = r.title;

  var btns = '';
  if (r.hasMap) {
    btns += '<button class="dp-btn dp-btn-map" onclick="goToMap(\'' + r.id + '\')">🗺 지도에서 보기</button>';
    btns += '<button class="dp-btn dp-btn-navi" onclick="goToMap(\'' + r.id + '\',true)">🧭 카카오내비 시작</button>';
  }
  btns += '<a class="dp-btn dp-btn-web" href="' + r.url + '" target="_blank" rel="noopener">🔗 공식 홈페이지</a>';

  var wps = '';
  if (r.waypoints && r.waypoints.length) {
    wps = '<div class="dp-section">'
      + '<div class="dp-label">경유 성지</div>'
      + '<div class="dp-waypoints">'
      + r.waypoints.map(function(wp) {
          var s = _byseq[wp.seq] || {};
          return '<div class="dpw-item">'
            + '<div class="dpw-no">' + wp.no + '</div>'
            + '<div class="dpw-name">' + escHtml(s.name || wp.label) + '</div>'
            + '</div>';
        }).join('')
      + '</div></div>';
  }

  document.getElementById('dp-body').innerHTML =
    '<div class="dp-section">'
    + '<div class="dp-label">운영</div><div class="dp-val">' + escHtml(r.org) + '</div>'
    + '</div>'
    + '<div class="dp-section">'
    + '<div class="dp-label">지역</div><div class="dp-val">📍 ' + escHtml(r.region) + '</div>'
    + '</div>'
    + (r.description ? '<div class="dp-section"><div class="dp-desc">' + escHtml(r.description) + '</div></div>' : '')
    + wps
    + '<div class="dp-btns">' + btns + '</div>';

  history.pushState({v:'detail'}, '');
  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  history.replaceState({v:'list'}, '');
}

function goToMap(id, navi) {
  location.href = 'map.html?course=' + id + (navi ? '&navi=1' : '');
}

window.addEventListener('popstate', function(e) {
  var panel = document.getElementById('detail-panel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
  }
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

history.replaceState({v:'list'}, '');
renderList();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
