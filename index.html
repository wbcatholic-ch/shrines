<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1F2A44">
<title>가톨릭길동무</title>
<link rel="manifest" href="../manifest.json">
<style>
:root {
  --d:#1F2A44; --gold:#C8962A; --gold-l:#FEF3D8;
  --bg:#F5F3EF; --card:#FFFFFF; --bdr:#E8E3D9;
  --gray:#8B8477; --shadow:0 2px 10px rgba(31,42,68,.10);
  --radius:14px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){
  :root{--d:#E8E4DC;--bg:#1A1E2A;--card:#252B3B;--bdr:#343B4F;--gray:#8B91A0;}
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--d);
  font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;}
body{padding:calc(var(--safe-t) + 20px) 20px calc(var(--safe-b) + 24px);}

.cover-head{display:flex;align-items:center;gap:12px;padding:8px 0 28px;}
.cover-logo{width:48px;height:48px;border-radius:12px;background:var(--d);
  display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.cover-title{font-size:22px;font-weight:800;letter-spacing:-.04em;color:var(--d);}
.cover-sub{font-size:12px;color:var(--gray);margin-top:2px;}

.cover-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--radius);
  padding:18px 16px;box-shadow:var(--shadow);cursor:pointer;
  display:flex;flex-direction:column;gap:8px;text-decoration:none;
  -webkit-tap-highlight-color:transparent;transition:transform .12s;}
.cc:active{transform:scale(.96);}
.cc-icon{font-size:28px;line-height:1;}
.cc-name{font-size:15px;font-weight:700;color:var(--d);letter-spacing:-.03em;}
.cc-desc{font-size:11px;color:var(--gray);font-weight:600;}
.cover-ver{text-align:center;font-size:10px;color:var(--bdr);margin-top:24px;}
</style>
</head>
<body>
<div class="cover-head">
  <div class="cover-logo">🕊</div>
  <div>
    <div class="cover-title">가톨릭길동무</div>
    <div class="cover-sub">성지순례 인증 앱</div>
  </div>
</div>

<div class="cover-grid">
  <a href="map.html" class="cc">
    <div class="cc-icon">🗺</div>
    <div class="cc-name">성지 지도</div>
    <div class="cc-desc">167개 성지 찾기</div>
  </a>
  <a href="stamp.html" class="cc">
    <div class="cc-icon">📍</div>
    <div class="cc-name">순례 스탬프</div>
    <div class="cc-desc">방문 인증 · 코스 추천</div>
  </a>
  <a href="prayer.html" class="cc">
    <div class="cc-icon">📖</div>
    <div class="cc-name">기도문</div>
    <div class="cc-desc">주요 가톨릭 기도문</div>
  </a>
  <a href="route.html" class="cc">
    <div class="cc-icon">🚶</div>
    <div class="cc-name">순례길</div>
    <div class="cc-desc">도보 순례 경로 안내</div>
  </a>
</div>

<div class="cover-ver">가톨릭길동무 V1</div>

<script src="sw-update.js?v=V1"></script>
</body>
</html>
