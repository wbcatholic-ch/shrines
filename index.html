<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="길동무">
<link rel="apple-touch-icon" href="icon-192x192.png">
<meta name="theme-color" content="#1f2a44">

<title>가톨릭길동무</title>

<!-- 카카오 인앱브라우저 → 크롬 강제 이동 -->
<script>
(function(){
  var ua = navigator.userAgent || '';
  if (!/KAKAOTALK/i.test(ua)) return;
  var url = location.href;
  if (/Android/i.test(ua)) {
    /* Android: intent:// 로 Chrome 지정 실행 */
    location.replace(
      'intent://' + url.replace(/^https?:\/\//, '') +
      '#Intent;scheme=https;action=android.intent.action.VIEW;' +
      'package=com.android.chrome;end;'
    );
  } else if (/iPhone|iPad|iPod/i.test(ua)) {
    /* iOS: googlechromes:// 스킴으로 Chrome 실행 */
    location.replace(url.replace(/^https?:\/\//, 'googlechromes://'));
  }
})();
</script>
<style>
:root {
  --navy:   #1f2a44;
  --gold:   #d4aa6a;
  --cream:  #fbf8f1;
  --stone:  #f3eee5;
  --ink:    #3e362e;
  --sub:    #7a7065;
  --line:   rgba(126,104,74,.22);
  --safe-t: env(safe-area-inset-top,0px);
  --safe-b: env(safe-area-inset-bottom,0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--cream); font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; color: var(--ink); }

/* 십자가 배경 */
#cross-bg {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    linear-gradient(to bottom, var(--cream) 0%, rgba(251,248,241,0) 28%, rgba(251,248,241,0) 72%, var(--cream) 100%),
    linear-gradient(to right,  var(--cream) 0%, rgba(251,248,241,0) 20%, rgba(251,248,241,0) 80%, var(--cream) 100%),
    url("intro-cross-jesus.jpg?v=V2-113") center/auto 96% no-repeat;
  opacity: .38;
}

/* 커버 */
#cover {
  position: fixed; inset: 0; z-index: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: calc(var(--safe-t) + 24px) 16px calc(var(--safe-b) + 20px);
  gap: clamp(10px, 2.5vh, 18px);
}

/* 헤더 */
.cover-header { text-align: center; }
.cover-subtitle { font-size: 13px; font-weight: 600; color: var(--sub); letter-spacing: .03em; margin-bottom: 6px; }
.cover-title {
  font-size: clamp(30px, 8vw, 42px); font-weight: 800; letter-spacing: -.03em; color: var(--ink);
  line-height: 1.1;
}
.cover-title::after {
  content: ''; display: block; width: 56px; height: 2px; margin: 8px auto 0;
  background: var(--gold); border-radius: 2px;
}

/* 그리드 */
.cover-grid {
  width: 100%; max-width: 420px;
  display: grid; grid-template-columns: 1fr 1fr;
  grid-template-rows: repeat(2, 1fr);
  gap: clamp(6px, 1.5vw, 10px);
  flex: 0 0 auto;
  height: clamp(200px, 42vh, 300px);
}

/* 카드 */
.cc {
  position: relative; overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  border-radius: 16px; text-decoration: none; cursor: pointer;
  background: linear-gradient(180deg, #fffdf8 0%, #f1e5d3 100%);
  border: 1px solid var(--line);
  box-shadow: 0 3px 10px rgba(47,41,33,.10);
  transition: transform .14s, filter .14s;
}
.cc::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--gold); opacity: .5;
}
.cc:active { transform: translateY(6px) scale(.976); filter: brightness(.95); }
#cc-1::before { background: #c0392b; }
#cc-2::before { background: var(--navy); }
#cc-3::before { background: #5c4a37; }
#cc-4::before { background: #1b7a3e; }

.cc-icon { font-size: clamp(28px, 7vw, 38px); line-height: 1; }
.cc-name { font-size: clamp(13px, 3.5vw, 16px); font-weight: 800; color: var(--ink); letter-spacing: -.02em; }

/* 하단 안내 */
.cover-note { font-size: 10px; color: var(--sub); text-align: center; line-height: 1.6; max-width: 340px; }
</style>
</head>
<body>
<div id="cross-bg"></div>
<div id="cover">
  <div class="cover-header">
    <p class="cover-subtitle">성지순례의 모든 여정을 함께합니다</p>
    <h1 class="cover-title">가톨릭 길동무</h1>
  </div>
  <div class="cover-grid">
    <a href="map.html" class="cc" id="cc-1">
      <span class="cc-icon">✝</span>
      <span class="cc-name">성지 지도</span>
    </a>
    <a href="stamp.html" class="cc" id="cc-2">
      <span class="cc-icon">📍</span>
      <span class="cc-name">순례 스탬프</span>
    </a>
    <a href="prayer.html" class="cc" id="cc-3">
      <span class="cc-icon">📖</span>
      <span class="cc-name">기도문</span>
    </a>
    <a href="route.html" class="cc" id="cc-4">
      <span class="cc-icon">🚶</span>
      <span class="cc-name">순례길</span>
    </a>
  </div>
  <p class="cover-note">본 앱은 가톨릭 신자들의 성지순례를 돕기 위해 만든 비공식 개인 앱입니다.<br>정보는 CBCK 및 각 교구 홈페이지를 참고했습니다.</p>
</div>
<script src="sw-update.js?v=V1"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
</script>
</body>
</html>
