<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>순례 스탬프 | 가톨릭길동무</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --d:    #1F2A44;
    --bg:   #EDE8E0;
    --card: #FFFBF2;
    --card-sub: #F5F0E8;
    --bdr:  #DDD5C8;
    --gold: #d4aa6a;
    --gold-l: #fdf6e8;
    --green: #2A8040;
    --green-l: #F0FDF4;
    --green-b: #BBF7D0;
    --gray-400: #94A3B8;
    --gray-500: #64748B;
    --gray-700: #374151;
    --gray-900: #0F172A;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --stamp-top-gap: env(safe-area-inset-top, 0px);
    --header-h: 70px;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    height: 100dvh; min-height: 100dvh;
    width: 100%; max-width: 720px;
    margin: 0 auto; color: var(--gray-900);
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column;
  }

  /* ── 헤더 ── */
  #header {
    width: 100%; box-sizing: border-box;
    background: var(--d); color: #fff;
    height: calc(var(--header-h) + var(--stamp-top-gap));
    min-height: calc(var(--header-h) + var(--stamp-top-gap));
    padding: var(--stamp-top-gap) 16px 0;
    display: flex; align-items: center; gap: 10px;
    flex: 0 0 auto; z-index: 100;
  }
  #stamp-icon {
    width: 35px; height: 35px; min-width: 35px;
    border-radius: 12px;
    background: rgba(255,255,255,.18); border: 1px solid rgba(255,255,255,.28);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; line-height: 1;
  }
  #header-texts { min-width: 0; flex: 1; display: flex; flex-direction: column; gap: 1px; }
  #header-texts .title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.03em; }
  #header-texts .sub   { font-size: 10px; font-weight: 500; color: rgba(255,255,255,.75); letter-spacing: .02em; }
  #close-btn {
    width: 40px; height: 40px; min-width: 40px;
    border-radius: 50%; background: rgba(255,255,255,.13); border: 1px solid rgba(255,255,255,.22);
    color: rgba(212,170,106,.95); font-size: 28px; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }

  /* ── 탭 바 ── */
  #tab-bar {
    display: flex; background: var(--card);
    border-bottom: 2px solid var(--bdr);
    flex: 0 0 auto; z-index: 90;
  }
  .tab-btn {
    flex: 1; height: 48px; border: none; background: none;
    font-family: inherit; font-size: 14px; font-weight: 600;
    color: var(--gray-500); cursor: pointer; position: relative;
    letter-spacing: -.03em; -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { color: var(--d); font-weight: 700; }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: -2px; left: 10%; width: 80%; height: 2.5px;
    background: var(--d); border-radius: 2px;
  }

  /* ── 필터 ── */
  #filter-bar {
    display: flex; gap: 6px; padding: 10px 14px 0;
    overflow-x: auto; scrollbar-width: none; flex: 0 0 auto;
  }
  #filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    flex-shrink: 0; height: 32px; padding: 0 14px;
    border-radius: 16px; border: 1.5px solid var(--bdr);
    background: var(--card); color: var(--gray-500);
    font-family: inherit; font-size: 13px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-chip.active { background: var(--d); color: #fff; border-color: transparent; }

  /* ── 메인 스크롤 ── */
  #main-scroll {
    flex: 1 1 auto; min-height: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 14px calc(24px + env(safe-area-inset-bottom, 0px));
  }

  /* ── 요약 카드 ── */
  #summary-card {
    background: var(--d); color: #fff;
    border-radius: var(--radius); padding: 18px 20px 16px;
    margin-bottom: 14px; box-shadow: 0 4px 16px rgba(31,42,68,.22);
  }
  .summary-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .summary-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.7); letter-spacing: .04em; }
  .summary-count { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
  .summary-count span { font-size: 16px; font-weight: 500; color: rgba(255,255,255,.6); margin-left: 2px; }
  .summary-percent { font-size: 13px; font-weight: 600; color: var(--gold); }
  .progress-bar-wrap { background: rgba(255,255,255,.18); border-radius: 6px; height: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 6px; transition: width .6s ease; }
  .summary-sub { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 8px; }

  /* ── 교구별 진행률 ── */
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--gray-500);
    letter-spacing: .04em; margin: 16px 0 8px;
  }
  .diocese-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .diocese-card {
    background: var(--card); border: 1px solid var(--bdr);
    border-radius: 12px; padding: 12px 14px; box-shadow: var(--shadow);
  }
  .diocese-name { font-size: 13px; font-weight: 700; color: var(--d); margin-bottom: 6px; }
  .diocese-prog-wrap { background: var(--bdr); border-radius: 4px; height: 5px; overflow: hidden; margin-bottom: 5px; }
  .diocese-prog-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .5s ease; }
  .diocese-count { font-size: 11px; color: var(--gray-500); font-weight: 600; }

  /* ── 성지 목록 카드 (직사각형) ── */
  .shrine-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 10px;
    padding: 12px 14px calc(var(--safe-b) + 24px);
  }
  @media (max-width: 380px) { .shrine-list { grid-template-columns: 1fr; } }

  .sh-card {
    background: var(--warm-white, #faf7f0);
    border: 1px solid #c8cfe8;
    border-radius: 10px;
    padding: 14px 14px 12px 18px;
    position: relative; overflow: hidden;
    transition: box-shadow .18s, transform .18s, border-color .18s;
  }
  .sh-card:active { transform: scale(.98); }
  /* 왼쪽 타입 컬러 스트라이프 */
  .sh-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 6px; border-radius: 4px 0 0 4px;
  }
  .sh-card.type-A { background: linear-gradient(to right, #fde8e6 0%, #faf7f0 32px); }
  .sh-card.type-A::before { background: linear-gradient(180deg, #e53935, #c0392b); }
  .sh-card.type-B { background: linear-gradient(to right, #ddeaff 0%, #faf7f0 32px); }
  .sh-card.type-B::before { background: linear-gradient(180deg, #1e88e5, #1565c0); }
  .sh-card.type-C { background: linear-gradient(to right, #d6f5e3 0%, #faf7f0 32px); }
  .sh-card.type-C::before { background: linear-gradient(180deg, #2e7d52, #1b7a3e); }

  .sh-no {
    position: absolute; top: 10px; right: 12px;
    font-size: 12px; color: #c8cfe8; font-weight: 400;
    font-family: 'Georgia', serif;
  }
  .sh-name {
    display: block; font-size: 15px; font-weight: 800; color: #1a2456;
    line-height: 1.45; margin-bottom: 7px; padding-right: 28px;
    text-decoration: none; letter-spacing: -.02em;
  }
  .sh-name:hover { color: #b8965a; text-decoration: underline; text-underline-offset: 3px; }
  .sh-addr {
    display: block; font-size: 12px; color: #5a6494;
    margin-bottom: 8px; line-height: 1.5; text-decoration: none;
  }
  .sh-addr:hover { color: #1a2456; text-decoration: underline; text-underline-offset: 2px; }
  .sh-meta { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 9px; }
  .sh-badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .sh-badge.type-A { background: #fff5f4; color: #c0392b; border: 1px solid #f5b8b0; }
  .sh-badge.type-B { background: #f0f5ff; color: #1565c0; border: 1px solid #90b8f0; }
  .sh-badge.type-C { background: #f0faf4; color: #1b7a3e; border: 1px solid #80cc9a; }
  .sh-ph  { font-size: 12px; color: #5a6494; }
  .sh-visit {
    font-size: 12px; font-weight: 700; color: var(--green);
    margin-bottom: 8px; padding: 4px 0;
    border-top: 1px dashed #c8cfe8;
  }
  .sh-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; border-top: 1px solid #e8ecf5; padding-top: 9px; }
  .sh-btn-add {
    flex: 1; min-width: 80px; height: 32px; border: none; border-radius: 6px;
    background: #1a2456; color: #f5edd8;
    font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer;
  }
  .sh-btn-del {
    height: 32px; padding: 0 12px; border: 1px solid #c8cfe8; border-radius: 6px;
    background: #f5f6f8; color: #5a6494;
    font-family: inherit; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .sh-links { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 4px; }
  .sh-link {
    font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 6px;
    text-decoration: none; border: 1px solid;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .sh-link-web  { background: #f0faf4; color: #1b7a3e; border-color: #80cc9a; }
    background: var(--card); border: 1px solid var(--bdr);
    border-radius: 12px; padding: 13px 15px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow); cursor: pointer;
    animation: fadeUp .2s ease both;
    transition: transform .12s;
  }
  /* ── 안내 박스 ── */
  .no-stamp-guide {
    background: var(--gold-l); border: 1px solid #E7D5B3;
    border-radius: 12px; padding: 14px 16px;
    font-size: 13px; color: #5B4630; line-height: 1.65;
    margin-bottom: 14px; font-weight: 500;
  }
  .no-stamp-guide strong { font-weight: 700; }

  /* ── 빈 화면 ── */
  .empty-box { text-align: center; padding: 50px 20px; color: var(--gray-400); }
  .empty-box .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-box .empty-txt  { font-size: 14px; line-height: 1.7; }

  /* ── 코스 추천 ── */
  .course-region-title {
    font-size: 13px; font-weight: 700; color: var(--gray-500);
    letter-spacing: .04em; margin: 16px 0 8px;
  }
  .course-region-title:first-child { margin-top: 2px; }
  .course-card {
    background: var(--card); border: 1px solid var(--bdr);
    border-radius: 12px; padding: 13px 15px; margin-bottom: 8px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .12s;
  }
  .course-card:active { transform: scale(.985); }
  .course-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .course-type {
    font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 8px;
  }
  .course-type.day  { background: var(--gold-l); color: #8a5a16; }
  .course-type.over { background: #EEF2FF; color: #3730A3; }
  .course-km { font-size: 11px; color: var(--gray-400); font-weight: 600; margin-left: auto; }
  .course-title { font-size: 15px; font-weight: 700; color: var(--d); margin-bottom: 3px; letter-spacing: -.03em; }
  .course-sub { font-size: 11px; color: var(--gray-500); font-weight: 600; }
  .course-sub .done { color: var(--green); }

  /* 코스 상세 */
  /* 순례 카드 */
  .vc-section-title {
    font-size: 13px; font-weight: 700; color: var(--gray);
    letter-spacing: .04em; margin: 18px 0 10px;
  }
  .vc-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px;
  }
  .vc-card {
    position: relative; overflow: hidden; border-radius: 14px;
    background: linear-gradient(180deg, #fffdf8 0%, #f1e5d3 100%);
    border: 1px solid rgba(126,104,74,.22);
    box-shadow: 0 3px 9px rgba(47,41,33,.10);
    cursor: pointer;
    transition: transform .12s, filter .12s;
  }
  .vc-card:active { transform: translateY(4px) scale(.977); filter: brightness(.96); }
  .vc-strip { height: 3px; width: 100%; flex-shrink: 0; }
  .vc-body { padding: 10px 10px 10px; }
  .vc-name {
    font-size: 14px; font-weight: 800; color: var(--d);
    letter-spacing: -.03em; line-height: 1.3; margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .vc-addr {
    font-size: 10px; color: var(--gray); line-height: 1.4; margin-bottom: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .vc-foot { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .vc-count {
    font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px;
    color: #fff; flex-shrink: 0;
  }
  .vc-last { font-size: 9px; color: var(--gray); text-align: right; line-height: 1.4; }

  /* 상세 패널 */
  #visit-detail {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;
    background: var(--card); border-radius: 20px 20px 0 0;
    box-shadow: 0 -4px 24px rgba(31,42,68,.16);
    transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
    max-height: 72vh; display: flex; flex-direction: column;
    padding-bottom: calc(var(--safe-b) + 8px);
  }
  #visit-detail.open { transform: none; }
  .vd-drag { width: 38px; height: 4px; background: var(--bdr); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
  .vd-head {
    display: flex; align-items: flex-start; gap: 8px; padding: 14px 16px 10px; flex-shrink: 0;
  }
  .vd-title-wrap { flex: 1; min-width: 0; }
  .vd-name { font-size: 18px; font-weight: 800; color: var(--d); letter-spacing: -.04em; }
  .vd-type {
    display: inline-block; margin-top: 4px; font-size: 9px; font-weight: 800;
    padding: 2px 8px; border-radius: 6px; color: #fff;
  }
  .vd-close { background: none; border: none; font-size: 20px; color: var(--gray); cursor: pointer; padding: 0; flex-shrink: 0; }
  .vd-divider { height: 1px; background: var(--bdr); margin: 0 16px 2px; flex-shrink: 0; }
  .vd-body { overflow-y: auto; padding: 0 16px 8px; }
  .vd-count-label { font-size: 12px; font-weight: 700; color: var(--gray); padding: 10px 0 6px; }
  .vd-date-row {
    display: flex; align-items: center; gap: 8px; padding: 9px 0;
    border-bottom: 1px solid var(--bdr);
  }
  .vd-date-row:last-of-type { border-bottom: none; }
  .vd-date-icon { font-size: 14px; flex-shrink: 0; }
  .vd-date-txt { flex: 1; font-size: 14px; font-weight: 600; color: var(--d); }
  .vd-date-del {
    background: none; border: 1px solid var(--bdr); border-radius: 6px;
    color: var(--gray); font-size: 11px; padding: 3px 8px; cursor: pointer;
    font-family: inherit; font-weight: 600;
  }
  .vd-add-btn {
    width: 100%; margin-top: 10px; height: 40px;
    background: none; border: 1.5px dashed var(--bdr); border-radius: 10px;
    font-family: inherit; font-size: 13px; color: var(--gray); cursor: pointer;
    font-weight: 700;
  }
  .vd-map-btn {
    width: 100%; margin-top: 8px; height: 44px;
    background: var(--d); color: #fff; border: none; border-radius: 12px;
    font-family: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .vd-backdrop {
    position: fixed; inset: 0; z-index: 59; background: rgba(0,0,0,.3);
    display: none; backdrop-filter: blur(1px);
  }
  .vd-backdrop.open { display: block; }
    display: inline-flex; align-items: center; gap: 4px;
    border: none; background: none; font-family: inherit;
    font-size: 13px; font-weight: 700; color: var(--gray-500);
    cursor: pointer; padding: 0; margin-bottom: 10px;
    -webkit-tap-highlight-color: transparent;
  }
  .cd-actions { display: flex; gap: 8px; margin-bottom: 12px; }
  .cd-btn {
    flex: 1; height: 42px; border: none; border-radius: 10px;
    font-family: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .cd-btn-map  { background: var(--card-sub); color: var(--d); border: 1px solid var(--bdr); }
  .cd-btn-navi { background: var(--d); color: #fff; }
  .course-detail-head {
    background: var(--d); color: #fff; border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 14px;
    box-shadow: 0 4px 16px rgba(31,42,68,.22);
  }
  .cd-title { font-size: 18px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 5px; }
  .cd-meta  { font-size: 12px; color: rgba(255,255,255,.72); font-weight: 600; }
  .cd-meta .done { color: var(--gold); }
  .course-steps { display: flex; flex-direction: column; }
  .cstep {
    display: flex; align-items: center; gap: 11px;
    background: var(--card); border: 1px solid var(--bdr);
    border-radius: 12px; padding: 11px 13px; margin-bottom: 7px;
    box-shadow: var(--shadow);
  }
  .cstep-num {
    width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
    background: var(--card-sub); border: 1.5px solid var(--bdr);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--gray-500);
  }
  .cstep-num.done { background: var(--green-l); border-color: var(--green); color: var(--green); }
  .cstep-info { flex: 1; min-width: 0; }
  .cstep-name { font-size: 14px; font-weight: 700; color: var(--d); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cstep-name.done { color: var(--green); }
  .cstep-addr { font-size: 11px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cstep-date { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 1px; }
  .cstep-nav {
    width: 38px; height: 38px; min-width: 38px; border-radius: 10px;
    background: #FEE500; color: #3C1E1E; text-decoration: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .course-foot-note {
    font-size: 11px; color: var(--gray-400); line-height: 1.6;
    text-align: center; margin-top: 10px;
  }

  @media (max-width: 380px) {
    #header-texts .title { font-size: 18px; }
    .diocese-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="header">
  <div id="stamp-icon">🕊</div>
  <div id="header-texts">
    <div class="title">순례 스탬프</div>
    <div class="sub">가톨릭길동무</div>
  </div>
  <button id="close-btn" onclick="handleBack()" aria-label="닫기">×</button>
</div>

<div id="tab-bar">
  <button class="tab-btn active" onclick="switchTab('overview')" id="tab-overview">순례 현황</button>
  <button class="tab-btn" onclick="switchTab('list')" id="tab-list">성지 목록</button>
  <button class="tab-btn" onclick="switchTab('course')" id="tab-course">코스 추천</button>
</div>

<div id="filter-bar" style="display:none;">
  <button class="filter-chip active" onclick="setFilter('all')" data-filter="all">전체</button>
  <button class="filter-chip" onclick="setFilter('stamped')" data-filter="stamped">✞ 순례완료</button>
  <button class="filter-chip" onclick="setFilter('A')" data-filter="A">성지</button>
  <button class="filter-chip" onclick="setFilter('B')" data-filter="B">순례지</button>
  <button class="filter-chip" onclick="setFilter('C')" data-filter="C">순교사적지</button>
</div>

<div id="main-scroll"></div>

<script src="shrines.js?v=V2"></script>
<script src="courses.js?v=V1b"></script>
<script>
/* ── 상수 ── */
var STAMP_KEY = 'catholic_stamp_visited_v1';  // app.js와 동일한 키

var DIOCESE = {
  SE:'서울대교구', SW:'수원교구', DG:'대구대교구', DJ:'대전교구',
  GJ:'광주대교구', IC:'인천교구', BS:'부산교구', JJ:'전주교구',
  UJ:'의정부교구', CJ:'청주교구', MS:'마산교구', CC:'춘천교구',
  WJ:'원주교구', AD:'안동교구', JE:'제주교구', ML:'군종교구'
};

var TYPE_LABEL = { A:'성지', B:'순례지', C:'순교사적지' };

/* ── 상태 ── */
var _tab    = 'overview';
var _filter = 'all';
var _shrines = [];
var _courses = [];
var _courseId = null;
var _byseq = {};

/* 코스 표시 순서(북→남) */
var REGION_ORDER = ['UJ','SE','IC','SW','CC','WJ','CJ','DJ','JJ','GJ','AD','DG','BS','MS','JE'];

/* ── localStorage 헬퍼 ── */
function getVisited() {
  try {
    var v = JSON.parse(localStorage.getItem(STAMP_KEY) || '{}');
    /* 구형 string → 배열 자동 마이그레이션 */
    var changed = false;
    Object.keys(v).forEach(function(seq) {
      if (typeof v[seq] === 'string') { v[seq] = [v[seq]]; changed = true; }
    });
    if (changed) saveVisited(v);
    return v;
  } catch(e) { return {}; }
}
function saveVisited(v) {
  try { localStorage.setItem(STAMP_KEY, JSON.stringify(v)); } catch(e) {}
}

/* 날짜 배열 헬퍼 */
function _today() { return new Date().toISOString().slice(0, 10); }
function _dates(v, seq) { return Array.isArray(v[seq]) ? v[seq] : []; }
function _cnt(v, seq)   { return _dates(v, seq).length; }
function _last(v, seq)  { var d = _dates(v, seq); return d.length ? d[d.length-1] : ''; }
function _hasDate(v, seq, date) { return _dates(v, seq).indexOf(date) !== -1; }

/* ── 초기화 ── */
function init() {
  var all = window._SH_RAW || [];
  _shrines = all.filter(function(s){ return s.stamp; });
  all.forEach(function(s){ _byseq[s.seq] = s; });
  _courses = window._COURSES || [];
  render();
}

/* ── 탭/필터 ── */
function switchTab(tab) {
  _tab = tab;
  if (tab === 'course') _courseId = null;
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('filter-bar').style.display = tab === 'list' ? 'flex' : 'none';
  render();
}
function setFilter(f) {
  _filter = f;
  document.querySelectorAll('.filter-chip').forEach(function(c){
    c.classList.toggle('active', c.dataset.filter === f);
  });
  render();
}

/* ── 스탬프 토글 (수동) ── */
function toggleStamp(seq, e) {
  if (e) e.stopPropagation();
  var v = getVisited();
  var dates = _dates(v, seq);
  if (dates.length) {
    /* 이미 방문 → 마지막 기록 삭제 또는 재방문 추가 선택 */
    var choice = confirm(
      '이미 방문한 성지입니다. (' + _cnt(v,seq) + '회)\n마지막 방문: ' + _last(v,seq)
      + '\n\n확인: 재방문 날짜 추가\n취소: 마지막 기록 삭제'
    );
    if (choice) {
      /* 날짜 입력 */
      var date = prompt('방문 날짜를 입력하세요 (YYYY-MM-DD)', _today());
      if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) return;
      if (_hasDate(v, seq, date)) { alert('이미 등록된 날짜입니다.'); return; }
      dates.push(date); dates.sort(); v[seq] = dates;
    } else {
      dates.pop();
      if (dates.length) v[seq] = dates; else delete v[seq];
    }
  } else {
    /* 첫 순례 — 날짜 입력 */
    var date2 = prompt('방문 날짜를 입력하세요 (YYYY-MM-DD)', _today());
    if (!date2 || !/^\d{4}-\d{2}-\d{2}$/.test(date2)) return;
    v[seq] = [date2];
  }
  saveVisited(v);
  render();
}

/* ── 렌더링 ── */
function render() {
  var scroll = document.getElementById('main-scroll');
  scroll.innerHTML = _tab === 'overview' ? renderOverview()
                   : (_tab === 'list' ? renderList() : renderCourse());
  scroll.scrollTop = 0;
}

function renderOverview() {
  var visited = getVisited();
  var total   = _shrines.length;
  var done    = _shrines.filter(function(s){ return _cnt(visited, s.seq) > 0; }).length;
  var totalVisits = _shrines.reduce(function(acc,s){ return acc + _cnt(visited, s.seq); }, 0);
  var pct     = total ? Math.round(done / total * 100) : 0;

  var dioMap = {};
  _shrines.forEach(function(s){
    if (!dioMap[s.diocese]) dioMap[s.diocese] = { total:0, done:0 };
    dioMap[s.diocese].total++;
    if (_cnt(visited, s.seq) > 0) dioMap[s.diocese].done++;
  });

  var dioHtml = Object.keys(dioMap)
    .sort(function(a,b){ return dioMap[b].done - dioMap[a].done || dioMap[b].total - dioMap[a].total; })
    .map(function(code){
      var d = dioMap[code];
      var p = Math.round(d.done / d.total * 100);
      return '<div class="diocese-card">'
        + '<div class="diocese-name">' + (DIOCESE[code]||code) + '</div>'
        + '<div class="diocese-prog-wrap"><div class="diocese-prog-fill" style="width:'+p+'%"></div></div>'
        + '<div class="diocese-count">' + d.done + ' / ' + d.total + '곳 (' + p + '%)</div>'
        + '</div>';
    }).join('');

  var guide = done === 0
    ? '<div class="no-stamp-guide">🗺 <strong>성지 지도</strong>를 열고 성지 근처에 가면<br>반경 500m 안에서 <strong>자동으로 순례가 기록</strong>됩니다.<br>아래 <strong>성지 목록</strong> 탭에서 직접 날짜를 입력할 수도 있어요.</div>'
    : '';

  return guide
    + '<div id="summary-card">'
    +   '<div class="summary-top">'
    +     '<div><div class="summary-label">순례 완료</div>'
    +     '<div class="summary-count">' + done + '<span> / ' + total + '곳</span></div></div>'
    +     '<div style="text-align:right"><div class="summary-percent">' + pct + '%</div>'
    +     (totalVisits > done ? '<div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:4px">누적 ' + totalVisits + '회 순례</div>' : '')
    +   '</div>'
    +   '</div>'
    +   '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>'
    +   '<div class="summary-sub">스탬프북 ' + total + '개 성지 기준</div>'
    + '</div>'
    + '<div class="section-title">교구별 진행률</div>'
    + '<div class="diocese-grid">' + dioHtml + '</div>'
    + renderVisitCards(visited);
}

function renderVisitCards(visited) {
  /* 방문한 성지만, 최근 날짜 순 정렬 */
  var list = _shrines
    .filter(function(s) { return _cnt(visited, s.seq) > 0; })
    .map(function(s) {
      var dates = Array.isArray(visited[s.seq]) ? visited[s.seq] : [];
      return { s: s, dates: dates.slice().sort(), cnt: dates.length };
    })
    .sort(function(a, b) {
      return (b.dates[b.dates.length-1] || '').localeCompare(a.dates[a.dates.length-1] || '');
    });

  if (!list.length) return '';

  var clr = { '성지':'#c0392b', '순례지':'#1565c0', '순교 사적지':'#1b7a3e' };
  var cards = list.map(function(o) {
    var s = o.s, c = clr[s.type] || '#888';
    var last = o.dates[o.dates.length-1] || '';
    return '<div class="vc-card" onclick="openVisitDetail(\'' + s.seq + '\')">'
      + '<div class="vc-strip" style="background:' + c + '"></div>'
      + '<div class="vc-body">'
      +   '<div class="vc-name">' + escHtml(s.name) + '</div>'
      +   '<div class="vc-addr">' + escHtml((s.addr || '').split(' ').slice(0, 3).join(' ')) + '</div>'
      +   '<div class="vc-foot">'
      +     '<span class="vc-count" style="background:' + c + '">' + o.cnt + '회 순례</span>'
      +     '<span class="vc-last">' + (DIOCESE[s.diocese] || s.diocese) + '<br>' + last + '</span>'
      +   '</div>'
      + '</div></div>';
  }).join('');

  return '<div class="vc-section-title">순례한 성지 · ' + list.length + '곳</div>'
    + '<div class="vc-grid">' + cards + '</div>';
}

function openVisitDetail(seq) {
  var s = _shrines.find(function(x) { return x.seq === seq; });
  if (!s) return;
  var clr = { '성지':'#c0392b', '순례지':'#1565c0', '순교 사적지':'#1b7a3e' };
  var c = clr[s.type] || '#888';

  document.getElementById('vd-name').textContent = s.name;
  var tb = document.getElementById('vd-type');
  tb.textContent = s.type || ''; tb.style.background = c;

  _renderVdDates(seq);

  document.getElementById('vd-add-btn').onclick = function() {
    var d = prompt('방문 날짜를 입력하세요 (YYYY-MM-DD)', new Date().toISOString().slice(0,10));
    if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return;
    var v = getVisited(), arr = Array.isArray(v[seq]) ? v[seq] : [];
    if (arr.indexOf(d) >= 0) { alert('이미 등록된 날짜입니다.'); return; }
    arr.push(d); arr.sort(); v[seq] = arr; saveVisited(v);
    _renderVdDates(seq); render();
  };
  document.getElementById('vd-map-btn').onclick = function() {
    location.href = 'map.html';
  };

  document.getElementById('visit-detail').classList.add('open');
  document.getElementById('vd-backdrop').classList.add('open');
}

function _renderVdDates(seq) {
  var v = getVisited(), arr = Array.isArray(v[seq]) ? v[seq].slice().sort().reverse() : [];
  var body = document.getElementById('vd-body');
  var rows = arr.map(function(d, i) {
    return '<div class="vd-date-row">'
      + '<span class="vd-date-icon">✝</span>'
      + '<span class="vd-date-txt">' + d + '</span>'
      + '<button class="vd-date-del" onclick="removeVisitDate(\'' + seq + '\',' + i + ')">삭제</button>'
      + '</div>';
  }).join('');
  body.innerHTML = '<div class="vd-count-label">순례 기록 ' + arr.length + '회</div>'
    + rows
    + '<button class="vd-add-btn" id="vd-add-btn">+ 날짜 추가</button>'
    + '<button class="vd-map-btn" id="vd-map-btn">🗺 성지 지도에서 보기</button>';
  /* rebind after re-render */
  var s = _shrines.find(function(x) { return x.seq === seq; });
  document.getElementById('vd-add-btn').onclick = function() {
    var d = prompt('방문 날짜를 입력하세요 (YYYY-MM-DD)', new Date().toISOString().slice(0,10));
    if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return;
    var v2 = getVisited(), a2 = Array.isArray(v2[seq]) ? v2[seq] : [];
    if (a2.indexOf(d) >= 0) { alert('이미 등록된 날짜입니다.'); return; }
    a2.push(d); a2.sort(); v2[seq] = a2; saveVisited(v2);
    _renderVdDates(seq); render();
  };
  document.getElementById('vd-map-btn').onclick = function() { location.href = 'map.html'; };
}

function removeVisitDate(seq, reversedIdx) {
  var v = getVisited(), arr = Array.isArray(v[seq]) ? v[seq].slice().sort().reverse() : [];
  var d = arr[reversedIdx];
  if (!d || !confirm(d + '\n이 순례 기록을 삭제할까요?')) return;
  /* 원본 배열에서 해당 날짜 제거 */
  var orig = Array.isArray(v[seq]) ? v[seq] : [];
  var idx = orig.indexOf(d);
  if (idx >= 0) { orig.splice(idx, 1); }
  if (orig.length) v[seq] = orig; else delete v[seq];
  saveVisited(v); _renderVdDates(seq); render();
}

function closeVisitDetail() {
  document.getElementById('visit-detail').classList.remove('open');
  document.getElementById('vd-backdrop').classList.remove('open');
}

function _hpUrl(hp) { return hp && !hp.startsWith('http') ? 'https://' + hp : hp; }

function renderList() {
  var visited = getVisited();
  var items   = _shrines.slice();
  if (_filter === 'stamped') {
    items = items.filter(function(s){ return _cnt(visited, s.seq) > 0; });
  } else if (_filter === 'A' || _filter === 'B' || _filter === 'C') {
    items = items.filter(function(s){ return s.type === _filter; });
  }
  if (!items.length) {
    return '<div class="empty-box"><div class="empty-icon">🕊</div><div class="empty-txt">해당하는 성지가 없습니다.</div></div>';
  }
  var allSeqs = _shrines.map(function(s){ return s.seq; });
  return '<div class="shrine-list">' + items.map(function(s) {
    var t    = s.type;
    var cnt  = _cnt(visited, s.seq);
    var last = _last(visited, s.seq);
    var isV  = cnt > 0;
    var no   = allSeqs.indexOf(s.seq) + 1;
    var cbckUrl = s.cbck || (s.seq ? 'https://www.cbck.or.kr/Catholic/Shrine/Read?seq=' + s.seq : '');
    var mapUrl  = s.kurl
      ? s.kurl
      : (s.lat && s.lng)
        ? 'https://map.kakao.com/link/to/' + encodeURIComponent(s.name) + ',' + s.lat + ',' + s.lng
        : 'https://map.kakao.com/?q=' + encodeURIComponent((s.addr || '') + ' ' + s.name);
    var hpUrl   = s.hp || '';
    var dioc    = DIOCESE[s.diocese] || s.diocese || '';
    return '<div class="sh-card type-' + t + '">'
      + '<span class="sh-no">' + no + '</span>'
      + (cbckUrl ? '<a class="sh-name" href="' + escHtml(cbckUrl) + '" target="_blank" rel="noopener">' + escHtml(s.name) + '</a>' : '<span class="sh-name">' + escHtml(s.name) + '</span>')
      + '<a class="sh-addr" href="' + escHtml(mapUrl) + '" target="_blank" rel="noopener">📍 ' + escHtml(s.addr || '') + '</a>'
      + '<div class="sh-meta">'
      +   '<span class="sh-badge type-' + t + '">' + (TYPE_LABEL[t] || '') + '&nbsp;' + escHtml(dioc) + '</span>'
      +   (s.tel ? '<span class="sh-ph">☎ ' + escHtml(s.tel) + '</span>' : '')
      + '</div>'
      + (hpUrl ? '<div class="sh-links"><a class="sh-link sh-link-web" href="' + escHtml(hpUrl) + '" target="_blank" rel="noopener">🔗 홈페이지</a></div>' : '')
      + (isV ? '<div class="sh-visit">✞ ' + cnt + '회 순례 · 마지막 ' + last + '</div>' : '')
      + '<div class="sh-btns">'
      +   '<button class="sh-btn-add" onclick="addManualStamp(\'' + s.seq + '\',event)">➕ 순례 기록 추가</button>'
      +   (isV ? '<button class="sh-btn-del" onclick="delLastStamp(\'' + s.seq + '\',event)">삭제</button>' : '')
      + '</div>'
      + '</div>';
  }).join('') + '</div>';
}

function addManualStamp(seq, e) {
  if (e) e.stopPropagation();
  var today = new Date().toISOString().slice(0, 10);
  var d = prompt('순례 날짜를 입력하세요 (YYYY-MM-DD)', today);
  if (!d || !/^\d{4}-\d{2}-\d{2}$/.test(d)) return;
  var v = getVisited(), arr = Array.isArray(v[seq]) ? v[seq] : [];
  if (arr.indexOf(d) >= 0) { alert('이미 등록된 날짜입니다.'); return; }
  arr.push(d); arr.sort(); v[seq] = arr;
  saveVisited(v); render();
}

function delLastStamp(seq, e) {
  if (e) e.stopPropagation();
  var v = getVisited(), arr = Array.isArray(v[seq]) ? v[seq] : [];
  if (!arr.length) return;
  if (!confirm('마지막 기록 ' + arr[arr.length-1] + '\n이 순례 기록을 삭제할까요?')) return;
  arr.pop(); if (arr.length) v[seq] = arr; else delete v[seq];
  saveVisited(v); render();
}

/* ── 코스 추천 ── */
function renderCourse() {
  if (_courseId) {
    var c = _courses.filter(function(x){ return x.id === _courseId; })[0];
    if (c) return renderCourseDetail(c);
    _courseId = null;
  }
  return renderCourseList();
}

function renderCourseList() {
  if (!_courses.length) {
    return '<div class="empty-box"><div class="empty-icon">🗺</div><div class="empty-txt">등록된 추천 코스가 없습니다.</div></div>';
  }
  var visited = getVisited();
  var html = '';
  REGION_ORDER.forEach(function(code){
    var list = _courses.filter(function(c){ return c.dio === code; });
    if (!list.length) return;
    html += '<div class="course-region-title">' + (DIOCESE[code] || code) + '</div>';
    list.forEach(function(c){
      var done = c.seqs.filter(function(q){ return _cnt(visited, q) > 0; }).length;
      var isOver = c.type === '1박2일';
      html += '<div class="course-card" onclick="openCourse(\'' + c.id + '\')">'
        + '<div class="course-card-top">'
        +   '<span class="course-type ' + (isOver ? 'over' : 'day') + '">' + c.type + '</span>'
        +   '<span class="course-km">🚗 약 ' + c.km + 'km</span>'
        + '</div>'
        + '<div class="course-title">' + escHtml(c.title) + '</div>'
        + '<div class="course-sub">' + c.seqs.length + '곳'
        +   (done ? ' · <span class="done">' + done + '곳 순례</span>' : '')
        + '</div>'
        + '</div>';
    });
  });
  return html;
}

function renderCourseDetail(c) {
  var visited = getVisited();
  var done = c.seqs.filter(function(q){ return _cnt(visited, q) > 0; }).length;
  var isOver = c.type === '1박2일';

  var steps = c.seqs.map(function(seq, i){
    var s = _byseq[seq];
    if (!s) return '';
    var isV = _cnt(visited, seq) > 0;
    var visitInfo = isV ? _cnt(visited,seq) + '회 · ' + _last(visited,seq) : '';
    var navUrl = _kakaoToLink(s);
    return '<div class="cstep">'
      + '<div class="cstep-num' + (isV ? ' done' : '') + '">' + (isV ? '✓' : (i + 1)) + '</div>'
      + '<div class="cstep-info">'
      +   '<div class="cstep-name' + (isV ? ' done' : '') + '">' + escHtml(s.name) + '</div>'
      +   '<div class="cstep-addr">' + escHtml(s.addr || '') + '</div>'
      +   (isV ? '<div class="cstep-date">방문 ' + visitInfo + '</div>' : '')
      + '</div>'
      + '<a class="cstep-nav" href="' + navUrl + '" aria-label="카카오맵 길찾기">🧭</a>'
      + '</div>';
  }).join('');

  return '<button class="course-back" onclick="closeCourse()">← 코스 목록</button>'
    + '<div class="cd-actions">'
    +   '<button class="cd-btn cd-btn-map" onclick="location.href=\'map.html?course=' + c.id + '\'">🗺 지도에서 보기</button>'
    +   '<button class="cd-btn cd-btn-navi" onclick="location.href=\'map.html?course=' + c.id + '&navi=1\'">🧭 내비 시작</button>'
    + '</div>'
    + '<div class="course-detail-head">'
    +   '<div class="cd-title">' + escHtml(c.title) + '</div>'
    +   '<div class="cd-meta">' + c.type + ' · ' + c.seqs.length + '곳 · 총 이동 약 ' + c.km + 'km'
    +     (done ? ' · <span class="done">' + done + '곳 순례</span>' : '') + '</div>'
    + '</div>'
    + '<div class="course-steps">' + steps + '</div>'
    + '<div class="course-foot-note">🧭 버튼을 누르면 카카오맵 길찾기가 열립니다.<br>성지 근처(반경 500m)에서 지도 앱을 열면 순례가 자동으로 기록됩니다.</div>';
}

function openCourse(id) { _courseId = id; render(); }
function closeCourse() { _courseId = null; render(); }

/* 카카오맵 길찾기 링크 (현재 위치 → 성지) */
function _kakaoToLink(s) {
  var nm = encodeURIComponent(s.name);
  return 'https://map.kakao.com/link/to/' + nm + ',' + s.lat + ',' + s.lng;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── 뒤로가기 ── */
function handleBack() {
  try {
    sessionStorage.setItem('oai_internal_return_no_effect_once','1');
    sessionStorage.setItem('oai_internal_return_no_effect_until', String(Date.now() + 7000));
    sessionStorage.setItem('oai_internal_page_nav','stamp');
    ['oai_external_nav_started_at','oai_external_nav_pagehide','oai_external_nav_kind',
     'oai_external_nav_pending','oai_external_nav_hold_until','oai_external_nav_force_release_at',
     'oai_refresh_veil_until','oai_refresh_veil_hold_ms','oai_refresh_veil_reason',
     'oai_refresh_veil_visible_until'].forEach(function(k){ sessionStorage.removeItem(k); });
  } catch(e) {}
  if (document.referrer && document.referrer.indexOf(location.hostname) >= 0) { history.back(); }
  else { location.href = 'index.html'; }
}

window.addEventListener('pagehide', function(){
  try {
    sessionStorage.setItem('oai_internal_return_no_effect_once','1');
    sessionStorage.setItem('oai_internal_return_no_effect_until', String(Date.now() + 7000));
  } catch(e) {}
}, true);

/* ── 시작 ── */
init();
</script>
